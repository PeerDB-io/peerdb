name: Flow build and test

on:
  pull_request:
    branches: [main]
    # Ignore changes to files that don't require builds or validations.
    # If more complex build avoidance is required, or for other events than pull_request, push, and pull_request_target,
    # replace this with a gate step in the job.
    # TODO: Re-enable build avoidance once we figure out how not to block the merge on the flow checks.
    #paths-ignore: &ignore_paths
    #    - '.claude/**'
    #    - 'README.md'
  push:
    branches: [main]
    #paths-ignore: *ignore_paths
  pull_request_target:
    branches: [main]
    #paths-ignore: *ignore_paths

permissions:
  contents: read

jobs:
  # Jobs that call a reusable workflow cannot set `environment:`, so the
  # manual-approval gate for external contributions (pull_request_target from
  # forks) lives in this job; flow_test only runs once it passes.
  gate:
    if: |
      (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository) ||
      (github.event_name == 'pull_request_target' && github.event.pull_request.head.repo.full_name != github.repository) ||
      github.event_name == 'push'
    environment: ${{ (github.event_name == 'pull_request_target' && github.event.pull_request.head.repo.full_name != github.repository) && 'external-contributor' || null }}
    runs-on: ubuntu-latest
    steps:
      - name: Approve run
        run: echo "Run approved for ${{ github.event_name }}."

  flow_test:
    name: flow_test (pg${{ matrix.db-version.pg }}, ${{ matrix.db-version.mysql }}, ${{ matrix.db-version.mariadb }}, mongo${{ matrix.db-version.mongo }}, ch-${{ matrix.db-version.ch }})
    needs: [gate]
    strategy:
      fail-fast: false
      matrix:
        db-version: [
          {pg: 16, mysql: 'mysql-gtid', mariadb: 'maria-11', mongo: '6.0', ch: 'lts'},
          {pg: 17, mysql: 'mysql-pos', mariadb: 'maria-12', mongo: '7.0', ch: 'stable'},
          {pg: 18, mysql: 'mysql-gtid', mariadb: 'maria-13', mongo: '8.0', ch: 'latest'},
        ]
        # Per-version container settings.
        # Wrapped in a single-item list because matrix values must be arrays; it stays
        # a single shared value (no extra jobs).
        version-configs:
          - mysql:
              mysql-gtid: mysql:9.5
              mysql-pos: mysql:5.7
            mariadb:
              maria-11: mariadb:lts-ubi9
              maria-12: mariadb:12-ubi
              maria-13: mariadb:13.0-ubi-rc
            clickhouse:
              lts: clickhouse/clickhouse-server:25.8.28.1
              stable: clickhouse/clickhouse-server:26.3.16.16
              latest: clickhouse/clickhouse-server:latest
    uses: ./.github/workflows/tilt-flow.yml
    with:
      # Empty matcher to run the whole test suite until test selection is routed through flow cases.
      test_matcher: ''
      # This is the list of services Tilt will enable for this run.
      ancillary_services: postgres postgres2 clickhouse clickhouse-keeper clickhouse-02 mongodb ${{ matrix.db-version.mysql }} mariadb toxiproxy openssh
      checkout_ref: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.sha || github.ref }}
      run_label: pg${{ matrix.db-version.pg }}-my${{ matrix.db-version.mysql }}-ma${{ matrix.db-version.mariadb }}-mo${{ matrix.db-version.mongo }}-ch${{ matrix.db-version.ch }}
      postgres_image: imresamu/postgis:${{ matrix.db-version.pg }}-3.5-alpine
      mysql_gtid_image: ${{ matrix.version-configs.mysql['mysql-gtid'] }}
      mysql_pos_image: ${{ matrix.version-configs.mysql['mysql-pos'] }}
      mariadb_image: ${{ matrix.version-configs.mariadb[matrix.db-version.mariadb] }}
      mongodb_image: mongo:${{ matrix.db-version.mongo }}
      clickhouse_image: ${{ matrix.version-configs.clickhouse[matrix.db-version.ch] }}
      # Point the tests at this combination's flavors; overrides what they load
      # from .env. The ports must match CI_MYSQL_GTID_PORT/CI_MYSQL_POS_PORT in
      # .env.example (the CI .env is seeded from it).
      test_env: |
        CI_MYSQL_VERSION=${{ matrix.db-version.mysql }}
        CI_MYSQL_PORT=${{ matrix.db-version.mysql == 'mysql-pos' && '3307' || '3306' }}
        CI_MARIADB_VERSION=${{ matrix.db-version.mariadb }}
    secrets: inherit
