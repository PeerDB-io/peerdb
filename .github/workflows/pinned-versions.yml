name: Pinned dependency versions

on:
  pull_request:
    branches: [main]
    paths: [flow/go.mod, flow/cmd/check_pinned_versions/**, .github/workflows/pinned-versions.yml]

permissions:
  contents: read

jobs:
  pinned_versions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: '1.26.1'
          cache-dependency-path: flow/go.sum

      - name: Check pinned dependency versions
        run: go run ./cmd/check_pinned_versions
        working-directory: ./flow
