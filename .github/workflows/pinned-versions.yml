name: Pinned dependency versions

on:
  pull_request:
    branches: [main]
    paths: [flow/go.mod, flow/cmd/check_pinned_versions/**, .github/workflows/pinned-versions.yml]

permissions:
  contents: read

jobs:
  pinned_versions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: '1.26.4'
          cache-dependency-path: flow/go.sum

      - name: Check pinned dependency versions
        run: go run ./cmd/check_pinned_versions
        working-directory: ./flow
