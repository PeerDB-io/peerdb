name: tilt-flow
run-name: 'tilt-flow: ${{ inputs.test_matcher }} [services: ${{ inputs.ancillary_services }}]'

# Like flow.yml, but instead of provisioning every service from scratch on the
# runner, it brings the whole stack up through Tilt (repo_root/Tiltfile). Tilt
# drives docker-compose-dev.yml (core PeerDB services) and
# ancillary-docker-compose.yml (test databases + infra). The tests themselves run
# on the host via gotestsum (selected by a Go test matcher) against that stack.
# Coverage and results are saved as a build artifact, and the test results are
# ingested into the CI observability store (shared with flow.yml).
#
# This workflow can be triggered manually (workflow_dispatch) or reused by another
# workflow (workflow_call, e.g. flow.yml): pick the Go test matcher to run and the
# ancillary services it needs.
#
# How a caller would invoke it (a reusable workflow runs as its own job, so it is
# referenced at jobs.<id>.uses, not as a step):
#
#   jobs:
#     pg-ch-e2e:
#       uses: ./.github/workflows/tilt-flow.yml
#       with:
#         test_matcher: TestGenericCH_PG
#         ancillary_services: postgres clickhouse
#         postgres_image: imresamu/postgis:18-3.5-alpine   # optional version pinning
#       secrets: inherit   # or pass CI_O11Y_TARGET_* explicitly; omit to skip ingestion

on:
  workflow_dispatch:
    inputs: &tilt_flow_inputs
      test_matcher:
        description: >-
          Go test matcher passed to `go test -run` (a regex). The tests run on the
          host against the Tilt-provided stack, over ./... so the matcher alone
          selects what runs. Examples: "TestGenericCH_PG", "TestMongoClickhouseSuite",
          "^TestPeerFlowE2ETestSuitePG_CH$", "TestApiPg". Leave empty to run everything.
        type: string
        required: false
        default: TestGenericCH_PG
      ancillary_services:
        description: >-
          Space-separated ancillary Tilt resources to start before the test.
          e2e tests need clickhouse plus their source DB (e.g. "postgres clickhouse",
          "mysql-gtid clickhouse", "mongodb clickhouse"); connector tests need just
          their DB. Append "toxiproxy openssh" for SSH/chaos tests.
        type: string
        required: false
        default: postgres clickhouse
      checkout_ref:
        description: >-
          Git ref or SHA to check out. Leave empty to use the triggering event's
          default; callers running on pull_request_target must pass the PR head
          SHA explicitly, or the base branch gets tested instead of the PR.
        type: string
        required: false
        default: ''
      test_env:
        description: >-
          Newline-separated KEY=VALUE pairs exported into the test run's
          environment, overriding what the tests load from the project-root
          .env.example.
        type: string
        required: false
        default: ''
      run_label:
        description: >-
          Short label identifying this run's version/flavor combination; used in
          the artifact name and the test-results combination id, so it must be
          unique among the calls within one workflow run. Restricted to
          [A-Za-z0-9._-]. Leave empty to derive it from the test matcher and
          image inputs.
        type: string
        required: false
        default: ''
      # The <db>_image inputs pin the docker images of the ancillary DBs.
      # When empty, default to last combination declared at flow.yml
      # following generate-test-environment.sh's defaults.
      postgres_image:
        description: Docker image for the postgres/postgres2 ancillary services (POSTGRES_IMAGE).
        type: string
        required: false
        default: ''
      mysql_gtid_image:
        description: Docker image for the mysql-gtid ancillary service (MYSQL_GTID_IMAGE).
        type: string
        required: false
        default: ''
      mysql_pos_image:
        description: >-
          Docker image for the mysql-pos ancillary service (MYSQL_POS_IMAGE).
          The local default is biarms/mysql:5.7 (multi-arch); CI passes the
          official mysql:5.7 image.
        type: string
        required: false
        default: ''
      mariadb_image:
        description: Docker image for the mariadb ancillary service (MARIADB_IMAGE).
        type: string
        required: false
        default: ''
      mongodb_image:
        description: Docker image for the mongodb ancillary service (MONGODB_IMAGE).
        type: string
        required: false
        default: ''
      clickhouse_image:
        description: >-
          Docker image for the clickhouse, clickhouse-keeper and clickhouse-02
          ancillary services (CLICKHOUSE_IMAGE).
        type: string
        required: false
        default: ''
  # Reuse the exact same inputs when invoked from another workflow. The o11y
  # secrets are optional: a caller can pass them explicitly or via
  # `secrets: inherit`; when absent, test-results ingestion is skipped.
  workflow_call:
    inputs: *tilt_flow_inputs
    secrets:
      CI_O11Y_TARGET_API_KEY_ID:
        required: false
      CI_O11Y_TARGET_API_KEY_SECRET:
        required: false
      CI_O11Y_TARGET_QUERY_ENDPOINT:
        required: false
      # Cloud-destination test credentials, used by the BigQuery/PubSub,
      # Snowflake, GCS and EventHubs suites.
      GCP_GH_CI_PKEY:
        required: false
      SNOWFLAKE_GH_CI_PKEY:
        required: false
      GCS_CREDS:
        required: false
      EH_CREDS:
        required: false
      AZURE_TENANT_ID:
        required: false
      AZURE_CLIENT_ID:
        required: false
      AZURE_CLIENT_SECRET:
        required: false
      AZURE_SUBSCRIPTION_ID:
        required: false

permissions:
  contents: read

concurrency:
  # Keyed per PR (falling back to the ref) and per input combination, so the
  # matrix fan-out from flow.yml doesn't cancel its own sibling jobs, and fork
  # PRs (pull_request_target runs on the base ref) don't collide with pushes
  # to main.
  group: tilt-flow-${{ github.event.pull_request.number || github.ref }}-${{ inputs.run_label }}-${{ inputs.test_matcher }}-${{ inputs.postgres_image }}-${{ inputs.mysql_gtid_image }}-${{ inputs.mysql_pos_image }}-${{ inputs.mariadb_image }}-${{ inputs.mongodb_image }}-${{ inputs.clickhouse_image }}
  cancel-in-progress: ${{ github.event_name != 'push' }}

env:
  # All tilt CLI calls in this repo talk to the control API on this port (see tilt.sh).
  TILT_PORT: "10352"
  # Pin Tilt for reproducible runs (matches the version used locally).
  TILT_VERSION: "0.37.0"
  # Don't phone home from CI.
  DO_NOT_TRACK: "1"
  # How many times to (re)load an unhealthy core PeerDB service before giving up.
  # Core services like flow-api/peerdb occasionally fail to initialize on a cold
  # start; reloading the individual resource recovers them. Bump this if the
  # runner is flaky.
  CORE_SERVICE_RECOVERY_ATTEMPTS: "3"
  # Bounds (seconds, inclusive) for the randomized wait between core-service
  # health polls.
  MIN_RECOVERY_TIME: "3"
  MAX_RECOVERY_TIME: "5"
  # Ancillary DB image pins consumed by generate-test-environment.sh, which the
  # Tiltfile runs on `tilt up`. Empty values fall back to the script's
  # defaults.
  POSTGRES_IMAGE: ${{ inputs.postgres_image }}
  MYSQL_GTID_IMAGE: ${{ inputs.mysql_gtid_image }}
  MYSQL_POS_IMAGE: ${{ inputs.mysql_pos_image }}
  MARIADB_IMAGE: ${{ inputs.mariadb_image }}
  MONGODB_IMAGE: ${{ inputs.mongodb_image }}
  CLICKHOUSE_IMAGE: ${{ inputs.clickhouse_image }}

jobs:
  tilt_flow_test:
    runs-on: ubuntu-latest-16-cores
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          # Empty = the event's default checkout; callers on pull_request_target
          # pass the PR head SHA here.
          ref: ${{ inputs.checkout_ref }}

      # Combination id for test-results ingestion steps
      - name: Compute run identity
        id: run-identity
        env:
          RUN_LABEL: ${{ inputs.run_label }}
          RAW_IDENTITY: "${{ inputs.test_matcher }} ${{ inputs.postgres_image }} ${{ inputs.mysql_gtid_image }} ${{ inputs.mysql_pos_image }} ${{ inputs.mariadb_image }} ${{ inputs.mongodb_image }} ${{ inputs.clickhouse_image }}"
        run: |
          label="${RUN_LABEL:-$RAW_IDENTITY}"
          suffix="$(printf '%s' "$label" | tr -c 'A-Za-z0-9._-' '-' | tr -s '-' | sed 's/^-*//; s/-*$//')"
          echo "suffix=${suffix:-all}" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: '1.26.5'
          cache-dependency-path: flow/go.sum

      # Tilt's `proto-gen` resource runs ./generate-protos.sh (buf generate +
      # go generate) on `tilt up`. The flow docker images and the host-run tests
      # both consume the resulting flow/generated code, so buf must be on PATH.
      - name: Install buf
        uses: bufbuild/buf-action@fd21066df7214747548607aaa45548ba2b9bc1ff # v1
        with:
          setup_only: true
          github_token: ${{ github.token }}

      - name: install lib-geos and pg_dump
        run: |
          # No need to update man pages on package install
          sudo apt-get remove --purge man-db
          # Add PGDG apt repo for latest PostgreSQL client packages
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc \
            --fail https://www.postgresql.org/media/keys/ACCC4CF8.asc
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] \
            https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          # libgeos-dev: geometry support; retry: used by the test-results
          # ingestion composite action's upload backoff.
          sudo apt-get install -y libgeos-dev retry
          # pg_dump must be >= the server major version; install v18 so it
          # can dump PG 16, 17, and 18 (backward compatible).
          sudo apt-get install -y postgresql-client-18
          echo /usr/lib/postgresql/18/bin >> $GITHUB_PATH

      - run: go mod download
        working-directory: ./flow

      - name: Install Tilt
        run: |
          curl -fsSL https://raw.githubusercontent.com/tilt-dev/tilt/master/scripts/install.sh | bash
          tilt version

      - name: Prepare environment for Tilt
        run: |
          # Tilt reads .env at the project root; it is gitignored, so seed it
          # from the checked-in template.
          if [ ! -f .env ]; then
            cp .env.example .env
          fi
          # The test launchers run `go test` on the host (Tilt local_resource),
          # but .env points the DBs at host.docker.internal. Map that name to the
          # loopback so the host can reach the docker-compose published ports.
          echo "127.0.0.1 host.docker.internal" | sudo tee -a /etc/hosts

      # ----------------------------------------------------------------------
      # Start Tilt. This replaces all of flow.yml's per-service provisioning:
      # `tilt up` builds/starts the core PeerDB services (and proto-gen) via
      # docker-compose. Ancillary DBs and test launchers are auto_init=False and
      # are started explicitly in the steps below.
      # ----------------------------------------------------------------------
      - name: Start Tilt
        run: |
          set -euo pipefail
          # `tilt up` serves the control API and runs until torn down, so launch
          # it in the background and drive it via the CLI in later steps.
          nohup tilt up --port "$TILT_PORT" --stream=true > "$RUNNER_TEMP/tilt-up.log" 2>&1 &
          echo $! > "$RUNNER_TEMP/tilt.pid"

          echo "Waiting for the Tilt API to come up..."
          for i in $(seq 1 60); do
            if tilt --port "$TILT_PORT" get uiresource >/dev/null 2>&1; then
              echo "Tilt API is reachable."
              break
            fi
            if [ "$i" -eq 60 ]; then
              echo "::error::Tilt API did not become reachable."
              cat "$RUNNER_TEMP/tilt-up.log" || true
              exit 1
            fi
            sleep 2
          done

      # ----------------------------------------------------------------------
      # Bring up the core PeerDB services, recovering any that fail to
      # initialize on the first attempt. Core services (e.g. flow-api, peerdb)
      # occasionally come up unhealthy on a cold start; when that happens we
      # reload the individual resource with `tilt trigger` and wait again, up to
      # CORE_SERVICE_RECOVERY_ATTEMPTS times before failing the run.
      # ----------------------------------------------------------------------
      - name: Bring up core PeerDB services (with recovery)
        run: |
          set -uo pipefail

          # Main PeerDB services that must be healthy before tests run. proto-gen
          # feeds the image builds; catalog/flow-api/flow-worker/flow-snapshot-worker
          # back the suites; peerdb and minio support peer setup and S3 staging.
          MAIN_SERVICES="proto-gen catalog flow-api flow-worker flow-snapshot-worker peerdb minio"
          # Per-attempt wait budget (generous, since flow images are built here).
          PER_ATTEMPT_TIMEOUT=600

          # Classify a resource as "ready", "error", or "pending".
          ready_status() {
            local res="$1" json upd run
            json="$(tilt --port "$TILT_PORT" get uiresource "$res" -o json 2>/dev/null)" || { echo pending; return; }
            upd="$(echo "$json" | jq -r '.status.updateStatus // "none"')"
            run="$(echo "$json" | jq -r '.status.runtimeStatus // "none"')"
            # A failed build/update or a crashed runtime means this attempt
            # failed -> the caller reloads the resource.
            if [ "$upd" = "error" ] || [ "$run" = "error" ]; then echo error; return; fi
            # Ready: the update succeeded and the runtime is healthy (ok) or the
            # resource genuinely has no long-running process (not_applicable, e.g.
            # proto-gen). A missing/empty runtime status (jq's "none" fallback)
            # means it hasn't come up yet, so fall through to "pending" and keep
            # probing rather than declaring it ready prematurely.
            if [ "$upd" = "ok" ] && { [ "$run" = "ok" ] || [ "$run" = "not_applicable" ]; }; then
              echo ready; return
            fi
            echo pending
          }

          # Randomized backoff (seconds) between health polls, in
          # [MIN_RECOVERY_TIME, MAX_RECOVERY_TIME] inclusive.
          recovery_sleep() {
            local span=$(( MAX_RECOVERY_TIME - MIN_RECOVERY_TIME + 1 ))
            [ "$span" -lt 1 ] && span=1
            sleep "$(( MIN_RECOVERY_TIME + RANDOM % span ))"
          }

          # Wait for a resource to become ready; on error or per-attempt timeout,
          # reload it (`tilt trigger`) and retry, up to the configured attempts.
          wait_or_recover() {
            local res="$1" attempt st deadline
            for attempt in $(seq 1 "$CORE_SERVICE_RECOVERY_ATTEMPTS"); do
              echo "[$res] readiness attempt ${attempt}/${CORE_SERVICE_RECOVERY_ATTEMPTS} (timeout ${PER_ATTEMPT_TIMEOUT}s)"
              deadline=$((SECONDS + PER_ATTEMPT_TIMEOUT))
              st=pending
              while [ "$SECONDS" -lt "$deadline" ]; do
                st="$(ready_status "$res")"
                case "$st" in
                  ready) echo "[$res] is Ready."; return 0 ;;
                  error) echo "::warning::[$res] entered an error state."; break ;;
                  *) recovery_sleep ;;
                esac
              done
              # Don't reload after the final attempt (nothing left to wait on).
              if [ "$attempt" -lt "$CORE_SERVICE_RECOVERY_ATTEMPTS" ]; then
                echo "::warning::[$res] not healthy (status: ${st}); reloading the resource."
                tilt --port "$TILT_PORT" logs --tail 100 "$res" || true
                tilt --port "$TILT_PORT" trigger "$res" || true
              fi
            done
            echo "::error::[$res] failed to become Ready after ${CORE_SERVICE_RECOVERY_ATTEMPTS} attempts."
            tilt --port "$TILT_PORT" logs --tail 200 "$res" || true
            return 1
          }

          rc=0
          for res in $MAIN_SERVICES; do
            wait_or_recover "$res" || rc=1
          done

          if [ "$rc" -ne 0 ]; then
            echo "::error::One or more core PeerDB services could not be recovered."
            cat "$RUNNER_TEMP/tilt-up.log" || true
            exit 1
          fi
          echo "Core PeerDB services are up."

      # ----------------------------------------------------------------------
      # Previous-to-last step: start the requested ancillary services and wait
      # until they (and their provisioning steps) are confirmed up and running.
      # ----------------------------------------------------------------------
      - name: Start requested ancillary services
        env:
          ANCILLARY_SERVICES: ${{ inputs.ancillary_services }}
        run: |
          set -euo pipefail
          if [ -z "${ANCILLARY_SERVICES// /}" ]; then
            echo "::error::No ancillary services specified."
            exit 1
          fi

          echo "Enabling ancillary services: $ANCILLARY_SERVICES"
          # enable accepts multiple resources at once...
          tilt --port "$TILT_PORT" enable $ANCILLARY_SERVICES
          # ...but enabling is not enough: each must be triggered to start.
          for svc in $ANCILLARY_SERVICES; do
            echo "Triggering $svc"
            tilt --port "$TILT_PORT" trigger "$svc"
          done

          wait_ready() {
            local res="$1"
            echo "Waiting for $res to be Ready..."
            if ! tilt --port "$TILT_PORT" wait --for=condition=Ready "uiresource/$res" --timeout=600s; then
              echo "::error::$res did not become Ready."
              tilt --port "$TILT_PORT" logs --tail 200 "$res" || true
              exit 1
            fi
          }

          # Wait until each service is Ready. Data stores also have an autostarted
          # provision-<svc> step (gated on the DB) — wait for that too so the
          # service is genuinely usable before the test runs.
          for svc in $ANCILLARY_SERVICES; do
            wait_ready "$svc"
            if tilt --port "$TILT_PORT" get uiresource "provision-$svc" >/dev/null 2>&1; then
              wait_ready "provision-$svc"
            fi
            # The 2-node ClickHouse cluster has an extra provisioning resource
            # gated on node 2 + keeper (+ provision-clickhouse); wait for it too
            # so cluster tests can't race it.
            if [ "$svc" = "clickhouse-02" ]; then
              wait_ready "provision-clickhouse-cluster"
            fi
          done
          echo "All requested ancillary services are up and running."

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@latest

      # ----------------------------------------------------------------------
      # Credentials for the cloud-destination suites (BigQuery/PubSub via the
      # GCP service account, Snowflake, GCS, EventHubs).
      # ----------------------------------------------------------------------
      - name: setup gcp service account
        id: gcp-service-account
        uses: jsdaniell/create-json@b8e77fa01397ca39cc4a6198cc29a3be5481afef # v1.2.3
        with:
          name: "bq_service_account.json"
          json: ${{ secrets.GCP_GH_CI_PKEY }}

      - name: setup snowflake credentials
        id: sf-credentials
        uses: jsdaniell/create-json@b8e77fa01397ca39cc4a6198cc29a3be5481afef # v1.2.3
        with:
          name: "snowflake_creds.json"
          json: ${{ secrets.SNOWFLAKE_GH_CI_PKEY }}

      - name: setup GCS credentials
        id: gcs-credentials
        uses: jsdaniell/create-json@b8e77fa01397ca39cc4a6198cc29a3be5481afef # v1.2.3
        with:
          name: "gcs_creds.json"
          json: ${{ secrets.GCS_CREDS }}

      - name: setup Eventhubs credentials
        id: eventhubs-credentials
        uses: jsdaniell/create-json@b8e77fa01397ca39cc4a6198cc29a3be5481afef # v1.2.3
        with:
          name: "eh_creds.json"
          json: ${{ secrets.EH_CREDS }}

      # ----------------------------------------------------------------------
      # Run the tests on the host against the Tilt-provided stack, selected by
      # the Go test matcher. Unlike flow.yml we do NOT start temporal/peer-flow
      # here — those run as containers managed by Tilt — but the gotestsum +
      # coverage invocation otherwise mirrors flow.yml's "run tests" step. The
      # tests auto-load connection settings from the project-root .env.
      # ----------------------------------------------------------------------
      - name: Run tests
        working-directory: ./flow
        env:
          TEST_MATCHER: ${{ inputs.test_matcher }}
          TEST_ENV: ${{ inputs.test_env }}
          TEST_BQ_CREDS: ${{ github.workspace }}/bq_service_account.json
          TEST_SF_CREDS: ${{ github.workspace }}/snowflake_creds.json
          TEST_GCS_CREDS: ${{ github.workspace }}/gcs_creds.json
          TEST_EH_CREDS: ${{ github.workspace }}/eh_creds.json
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          # Disable errexit so we can capture gotestsum's exit code and still emit
          # coverage for the artifact upload; keep nounset.
          set +e -u

          # Per-run test environment overrides (e.g. the MySQL flavor under
          # test). Exported before gotestsum runs: the tests' .env auto-load
          # (godotenv) never overrides variables already present in the
          # process environment, so these take precedence.
          while IFS= read -r override; do
            [ -n "$override" ] || continue
            echo "test env override: $override"
            export "$override"
          done < <(printf '%s\n' "$TEST_ENV")

          # Write coverage OUTSIDE the flow/ tree. `tilt up` keeps live-watching
          # flow/ for the whole job (the flow images use docker_build only=['flow/']),
          # so writing coverage into flow/coverage during the run would trigger Tilt
          # to rebuild flow-worker/flow-api/flow-snapshot-worker mid-test, knocking
          # them back to in_progress. $RUNNER_TEMP is outside the repo, so it's never
          # watched.
          coverdir="$RUNNER_TEMP/gocoverdir"
          mkdir -p "$coverdir" ../logs

          # Only scope by -run when a matcher was provided (empty => run everything).
          run_args=()
          if [ -n "${TEST_MATCHER// /}" ]; then
            run_args=(-run "$TEST_MATCHER")
          fi

          gotestsum --format standard-quiet --no-color --junitfile ../logs/test-results.xml -- \
            -cover -coverpkg github.com/PeerDB-io/peerdb/flow/... -p 32 ./... "${run_args[@]}" -timeout 1200s \
            -args -test.gocoverdir="$coverdir"
          rc=$?

          # Emit coverage even on test failure so the uploaded artifact always has data.
          go tool covdata textfmt -i="$coverdir" -o ../coverage.out || true
          exit "$rc"

      - name: Capture Tilt state and service logs on failure
        if: failure()
        run: |
          set +e -u
          mkdir -p logs

          # Full resource state -> step log + artifact (queryable with jq).
          echo "===== Tilt resource state ====="
          tilt --port "$TILT_PORT" get uiresource -o json | tee logs/tilt-resources.json

          # Highlight non-test resources that weren't healthy at failure time.
          echo "===== Non-test resources not in updateStatus=ok ====="
          jq '.items[]
                | select((.metadata.name | startswith("e2e_")) or (.metadata.name | startswith("connector_")) | not)
                | select(.status.updateStatus != "ok" and .status.updateStatus != "none")
                | {name: .metadata.name, updateStatus: .status.updateStatus, runtimeStatus: .status.runtimeStatus}' \
             logs/tilt-resources.json 2>/dev/null || true

          # Capture container logs for the snapshot path (snapshot-worker writes to
          # MinIO/S3, ClickHouse loads from it) so server-side failures like a stuck
          # initial snapshot are visible in the artifact. The mirror runs in the
          # flow-worker/flow-snapshot-worker containers, so these are the only window
          # into why it hangs in STATUS_SNAPSHOT.
          #
          # NOTE: `tilt logs` is unavailable here — in this headless `tilt up --stream`
          # run Tilt serves the apiserver (so `tilt get/enable/trigger/wait` work) but
          # not the web-UI websocket `tilt logs` needs ("websocket: bad handshake").
          # Tilt drives docker-compose, so read the logs straight from Docker instead.
          echo "===== Containers ====="
          docker ps -a --format '{{.Names}}\t{{.Status}}' | tee logs/docker-ps.txt
          echo "===== Capturing docker container logs ====="
          docker ps -a --format '{{.Names}}' | while read -r c; do
            [ -n "$c" ] || continue
            echo "  $c -> logs/docker-$c.log"
            docker logs --timestamps "$c" > "logs/docker-$c.log" 2>&1 || true
          done

      - name: Upload logs and test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: tilt-flow-logs-${{ steps.run-identity.outputs.suffix }}
          path: |
            logs/
            coverage.out
          retention-days: 30

      - name: Ingest tests results for analysis
        if: success() || failure()
        uses: ./.github/actions/ingest-test-results
        with:
          combination-id: "tilt-${{ steps.run-identity.outputs.suffix }}"
          o11y-api-key-id: ${{ secrets.CI_O11Y_TARGET_API_KEY_ID }}
          o11y-api-key-secret: ${{ secrets.CI_O11Y_TARGET_API_KEY_SECRET }}
          o11y-query-endpoint: ${{ secrets.CI_O11Y_TARGET_QUERY_ENDPOINT }}
