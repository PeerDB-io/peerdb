name: peerdb-infra-only

# Infrastructure-only compose file for local flow development
# Use this when running flow components (api, worker, snapshot-worker) locally
#
# Usage:
#   docker compose -f docker-compose-infra.yml up -d
#
# Then run flow components locally:
#   cd flow && go build -o peer-flow && ./peer-flow api
#   cd flow && ./peer-flow worker
#   cd flow && ./peer-flow snapshot-worker

x-minio-config: &minio-config
  PEERDB_CLICKHOUSE_AWS_CREDENTIALS_AWS_ACCESS_KEY_ID: _peerdb_minioadmin
  MINIO_ROOT_USER: _peerdb_minioadmin
  PEERDB_CLICKHOUSE_AWS_CREDENTIALS_AWS_SECRET_ACCESS_KEY: _peerdb_minioadmin
  MINIO_ROOT_PASSWORD: _peerdb_minioadmin
  PEERDB_CLICKHOUSE_AWS_CREDENTIALS_AWS_REGION: us-east-1
  PEERDB_CLICKHOUSE_AWS_CREDENTIALS_AWS_ENDPOINT_URL_S3: http://localhost:9001
  PEERDB_CLICKHOUSE_AWS_S3_BUCKET_NAME: peerdb

services:
  catalog:
    container_name: catalog
    image: postgres:18-alpine@sha256:b40d931bd0e7ce6eecc59a5a6ac3b3c04a01e559750e73e7086b6dbd7f8bf545
    command: -c config_file=/etc/postgresql.conf
    ports:
      - 5432:5432
    environment:
      PGUSER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
      POSTGRES_INITDB_ARGS: --locale=C.UTF-8
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./volumes/postgresql.conf:/etc/postgresql.conf
      - ./volumes/docker-entrypoint-initdb.d:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "pg_isready", "-d", "postgres", "-U", "postgres"]
      interval: 10s
      timeout: 30s
      retries: 5
      start_period: 60s

  temporal:
    container_name: temporal
    depends_on:
      catalog:
        condition: service_healthy
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PWD=postgres
      - POSTGRES_SEEDS=catalog
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/development-sql.yaml
    image: temporalio/auto-setup:1.29@sha256:5b3502a3b685f9eff1b925af90c57c9e3dbeccbef367cc28a2a9712c63379312
    ports:
      - 7233:7233
    volumes:
      - ./volumes/temporal-dynamicconfig:/etc/temporal/config/dynamicconfig
    labels:
      kompose.volume.type: configMap

  temporal-admin-tools:
    container_name: temporal-admin-tools
    depends_on:
      - temporal
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CLI_ADDRESS=temporal:7233
      - TEMPORAL_CLI_SHOW_STACKS=1
    image: temporalio/admin-tools:1.25.2-tctl-1.18.1-cli-1.1.1@sha256:da0c7a7982b571857173ab8f058e7f139b3054800abb4dcb100445d29a563ee8
    stdin_open: true
    tty: true
    entrypoint: /etc/temporal/entrypoint.sh
    restart: on-failure
    healthcheck:
      test: ["CMD", "tctl", "workflow", "list"]
      interval: 1s
      timeout: 5s
      retries: 30
    volumes:
      - ./scripts/mirror-name-search.sh:/etc/temporal/entrypoint.sh

  temporal-ui:
    container_name: temporal-ui
    depends_on:
      - temporal
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:3000
      - TEMPORAL_CSRF_COOKIE_INSECURE=true
    image: temporalio/ui:2.44.0@sha256:0b36e00aad304134eb908f41bf915934afe4eef1efc5b1750c65a5312ff3c9bb
    ports:
      - 8085:8080

  minio:
    image: minio/minio:latest@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e
    container_name: minio
    volumes:
      - minio-data:/data
    ports:
      - "9001:9000"
      - "9002:36987"
    environment:
      <<: *minio-config
    entrypoint: >
      /bin/sh -c "
      minio server /data --console-address=:36987 &
      sleep 2;
      mc alias set myminiopeerdb http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD;
      mc mb myminiopeerdb/$$PEERDB_CLICKHOUSE_AWS_S3_BUCKET_NAME;
      wait
      "

  # Optional: Nexus (SQL interface) - uncomment if you want to test SQL commands
  # peerdb:
  #   container_name: peerdb-server
  #   stop_signal: SIGINT
  #   build:
  #     context: .
  #     dockerfile: stacks/peerdb-server.Dockerfile
  #   environment:
  #     PEERDB_CATALOG_HOST: catalog
  #     PEERDB_CATALOG_PORT: 5432
  #     PEERDB_CATALOG_USER: postgres
  #     PEERDB_CATALOG_PASSWORD: postgres
  #     PEERDB_CATALOG_DATABASE: postgres
  #     PEERDB_PASSWORD: peerdb
  #     PEERDB_FLOW_SERVER_ADDRESS: grpc://host.docker.internal:8112
  #     RUST_LOG: info
  #   ports:
  #     - 9900:9900
  #   depends_on:
  #     catalog:
  #       condition: service_healthy

volumes:
  pgdata:
  minio-data:

networks:
  default:
    name: peerdb_network
